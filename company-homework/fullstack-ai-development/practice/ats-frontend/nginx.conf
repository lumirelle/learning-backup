# ─────────────────────────────────────────────────────────────
# ATS Frontend nginx 反代配置 · prod
#
# 三件套：
#  1) 静态资源 + history fallback（SPA 路由）
#  2) /api/v1 透传到后端 (compose 服务名 backend，端口 8080)
#  3) /uploads → /api/v1/files (与前端 resumeDownloadUrl 转换一致)
# ─────────────────────────────────────────────────────────────

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # gzip：vite 已 brotli/gzip 预压缩可禁用，这里保守开
    gzip on;
    gzip_vary on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;
    gzip_proxied any;

    # 安全头（最小集合，按需加）
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # 静态资源长缓存 + immutable hash（vite 默认产物已带 hash）
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|avif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA 路由：所有非静态、非 API 命中都回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # API 反代 → backend:8080
    # 注意 server.servlet.context-path: /api/v1，nginx 不要再加 /api/v1 前缀
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 10m;  # 与 backend UPLOAD_MAX_FILE_MB 留 buffer
    }

    # 简历 / 文件下载兼容：旧链接 /uploads/xxx 转后端 /api/v1/files/xxx
    location /uploads/ {
        rewrite ^/uploads/(.*)$ /api/v1/files/$1 last;
    }
}
