name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Backend tests
        run: mvn -f ats-backend/pom.xml -B test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install & check frontend
        working-directory: ats-frontend
        run: |
          bun install
          bun run typecheck
          bun run lint
