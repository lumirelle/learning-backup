spring:
  application:
    name: ats-backend
  config:
    import: optional:file:./.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ats_db}
    username: ${DB_USER:ats_user}
    password: ${DB_PASSWORD:ats_pwd}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_MB:5}MB
      max-request-size: ${UPLOAD_MAX_FILE_MB:5}MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.ats.entity
  type-handlers-package: com.ats.config
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

ats:
  jwt:
    # 路径策略：dev 默认指向 infra/jwt（仓库根下），prod 通过 env 覆盖到 secret 挂载点
    # 路径基准 = backend 启动 cwd（bun run be:dev → ats-backend/，故 ../infra/jwt 解析为仓库根 infra/jwt）
    key-dir: ${ATS_JWT_KEY_DIR:../infra/jwt}
    private-key-file: ${JWT_PRIVATE_KEY_FILE:dev-private.pem}
    public-key-file: ${JWT_PUBLIC_KEY_FILE:dev-public.pem}
    # access：短寿命，泄露损失低；refresh：长寿命，存 HttpOnly cookie 由服务端可吊销
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}        # 15 min
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:2592000}  # 30 day
    issuer: ${JWT_ISSUER:ats.local}
    # refresh cookie 配置（HttpOnly，由后端写、清；前端 axios withCredentials 自动带）
    refresh-cookie:
      name: ats_refresh
      path: /api/v1/auth        # 仅 auth/refresh + auth/logout 路径会带上
      same-site: ${JWT_REFRESH_COOKIE_SAMESITE:Lax}   # dev:Lax，跨域生产改 None+Secure
      secure: ${JWT_REFRESH_COOKIE_SECURE:false}      # dev:false，生产 true（HTTPS only）
      domain: ${JWT_REFRESH_COOKIE_DOMAIN:}           # 不设默认当前域；多子域可设 .example.com
  upload:
    path: ${UPLOAD_PATH:./uploads}
    max-file-mb: ${UPLOAD_MAX_FILE_MB:5}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.ats: DEBUG
    org.springframework.security: INFO
    com.baomidou.mybatisplus: INFO
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %m%n'
